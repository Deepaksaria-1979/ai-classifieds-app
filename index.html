<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Classifieds - OLX & JustDial Hybrid</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <!-- Top Navigation -->
    <nav class="bg-blue-600 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight cursor-pointer" onclick="showSection('browse')">Smart<span class="text-yellow-400">List</span></h1>
            <button onclick="showSection('post')" class="bg-yellow-400 hover:bg-yellow-500 text-blue-900 font-bold px-5 py-2 rounded-full shadow transition flex items-center gap-2">
                <i class="fa-solid fa-circle-plus"></i> Post Ad
            </button>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="max-w-6xl mx-auto px-4 py-6">

        <!-- SECTION 1: BROWSE ADS -->
        <section id="browse-section">
            <!-- Categories Grid -->
            <h2 class="text-xl font-bold mb-4 text-gray-700">Browse Categories</h2>
            <div id="category-container" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-3 mb-8">
                <!-- Dynamically injected -->
            </div>

            <!-- Ads Feed -->
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-700" id="feed-title">Recent Advertisements</h2>
                <button onclick="loadAds()" class="text-blue-600 text-sm font-semibold hover:underline">Refresh</button>
            </div>
            <div id="ads-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                <!-- Ads injected here -->
            </div>
        </section>

        <!-- SECTION 2: POST AD (WITH AI SCANNER) -->
        <section id="post-section" class="hidden max-w-2xl mx-auto bg-white p-6 rounded-xl shadow-lg border border-gray-100">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Create Advertisement</h2>
                <button onclick="showSection('browse')" class="text-gray-500 hover:text-gray-700"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>

            <form id="ad-form" onsubmit="handleFormSubmit(event)" class="space-y-4">
                <!-- Image Gallery Picker -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Upload Photo from Gallery</label>
                    <div class="flex items-center justify-center w-full">
                        <label class="flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-gray-300 rounded-lg cursor-pointer bg-gray-50 hover:bg-gray-100 transition relative overflow-hidden">
                            <div id="upload-placeholder" class="flex flex-col items-center justify-center pt-5 pb-6">
                                <i class="fa-solid fa-cloud-arrow-up text-3xl text-gray-400 mb-2"></i>
                                <p class="text-sm text-gray-500"><span class="font-semibold">Click to upload</span></p>
                                <p class="text-xs text-gray-400">AI will automatically fill details</p>
                            </div>
                            <img id="image-preview" class="hidden absolute inset-0 w-full h-full object-cover">
                            <input type="file" id="photo-input" accept="image/*" class="hidden" onchange="processAIImage(event)">
                        </label>
                    </div>
                    <div id="ai-status" class="text-sm font-semibold text-blue-600 mt-2 hidden flex items-center gap-2">
                        <i class="fa-solid fa-circle-notch animate-spin"></i> AI is analyzing your item...
                    </div>
                </div>

                <!-- Form Fields -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Listing Name / Title</label>
                        <input type="text" id="form-name" required class="mt-1 block w-full p-2.5 border rounded-lg bg-white shadow-sm focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Category</label>
                        <select id="form-category" required class="mt-1 block w-full p-2.5 border rounded-lg bg-white shadow-sm focus:ring-blue-500 focus:border-blue-500">
                            <!-- Injected -->
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Price / Service Rate (₹)</label>
                        <input type="text" id="form-price" required class="mt-1 block w-full p-2.5 border rounded-lg bg-white shadow-sm focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">WhatsApp Number (With Country Code)</label>
                        <input type="tel" id="form-whatsapp" placeholder="e.g. 919876543210" required class="mt-1 block w-full p-2.5 border rounded-lg bg-white shadow-sm focus:ring-blue-500 focus:border-blue-500">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Address / Location</label>
                    <input type="text" id="form-address" required class="mt-1 block w-full p-2.5 border rounded-lg bg-white shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>

                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-md transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-bullhorn"></i> Publish Advertisement
                </button>
            </form>
        </section>
    </main>

    <script>
        // CONFIGURATION
        const CLOUDFLARE_WORKER_URL = 'https://workers.dev'; 
        const GEMINI_API_KEY = 'YOUR_GEMINI_API_KEY'; // Replace with your key

        // CATEGORIES (OLX + Justdial Hybrid)
        const categories = [
            { id: 'property', name: 'Property', icon: 'fa-building' },
            { id: 'fashion', name: 'Fashion', icon: 'fa-shirt' },
            { id: 'footwear', name: 'Footwear', icon: 'fa-shoe-prints' },
            { id: 'personal service', name: 'Personal Service', icon: 'fa-handshake' },
            { id: 'loan', name: 'Loan', icon: 'fa-hand-holding-dollar' },
            { id: 'cars', name: 'Cars & Vehicles', icon: 'fa-car' },
            { id: 'mobile', name: 'Mobiles & Tech', icon: 'fa-mobile-screen' },
            { id: 'plumber service', name: 'Plumber Service', icon: 'fa-wrench' },
            { id: 'maid services', name: 'Maid Services', icon: 'fa-broom' },
            { id: 'security guard', name: 'Security Guard', icon: 'fa-shield-halved' },
            { id: 'shopkeeper', name: 'Shopkeeper', icon: 'fa-store' },
            { id: 'wholesaler', name: 'Wholesaler', icon: 'fa-boxes-stacked' }
        ];

        let base64ImageString = ""; 

        // Init App
        window.onload = () => {
            renderCategories();
            loadAds();
        };

        function showSection(section) {
            document.getElementById('browse-section').classList.toggle('hidden', section !== 'browse');
            document.getElementById('post-section').classList.toggle('hidden', section !== 'post');
        }

        function renderCategories() {
            const catContainer = document.getElementById('category-container');
            const selectContainer = document.getElementById('form-category');
            
            catContainer.innerHTML = '';
            selectContainer.innerHTML = '<option value="">Select Category</option>';

            categories.forEach(cat => {
                // Render browsing grid
                catContainer.innerHTML += `
                    <div onclick="filterCategory('${cat.id}')" class="bg-white p-3 rounded-xl border border-gray-200 text-center shadow-sm hover:shadow-md cursor-pointer transition transform hover:-translate-y-0.5">
                        <i class="fa-solid ${cat.icon} text-xl text-blue-600 mb-1"></i>
                        <p class="text-xs font-semibold text-gray-700 truncate">${cat.name}</p>
                    </div>`;
                // Render select dropdown
                selectContainer.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
            });
        }

        // Gemini AI Vision Scanner implementation
        async function processAIImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Render Preview
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('image-preview').src = e.target.result;
                document.getElementById('image-preview').classList.remove('hidden');
                document.getElementById('upload-placeholder').classList.add('hidden');
                base64ImageString = e.target.result; 
            };
            reader.readAsDataURL(file);

            // Trigger AI Scanner
            const aiStatus = document.getElementById('ai-status');
