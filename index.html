<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartList AI App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #f3f4f6; color: #1f2937; padding-bottom: 30px; }
        
        /* Top Navigation Bar */
        .navbar { background-color: #1e3a8a; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .navbar h1 { font-size: 20px; font-weight: bold; cursor: pointer; }
        .navbar h1 span { color: #facc15; }
        
        /* Fixed working Post button */
        .post-btn { background-color: #facc15; color: #1e3a8a; border: none; padding: 10px 18px; font-weight: bold; border-radius: 20px; cursor: pointer; font-size: 14px; display: block; }

        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        h2 { font-size: 16px; font-weight: bold; margin: 20px 0 10px 0; color: #4b5563; }
        
        /* 3-Column Grid for Categories */
        .grid-system { display: grid; grid-template-cols: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .category-box { background-color: white; padding: 15px 5px; border-radius: 8px; border: 1px solid #e5e7eb; text-align: center; cursor: pointer; font-weight: bold; font-size: 12px; color: #1e3a8a; }

        /* Form Layout styling */
        .form-box { background-color: white; padding: 20px; border-radius: 12px; border: 1px solid #e5e7eb; }
        .form-row { margin-bottom: 15px; }
        .form-row label { display: block; font-size: 13px; font-weight: bold; color: #4b5563; margin-bottom: 5px; }
        .input-field { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; outline: none; }
        
        /* AI Gallery Photo Selection Area */
        .upload-area { border: 2px dashed #cbd5e1; background-color: #f8fafc; padding: 25px; text-align: center; border-radius: 8px; cursor: pointer; margin-bottom: 15px; font-weight: bold; color: #1e3a8a; font-size: 14px; }
        #image-preview { width: 100%; max-height: 180px; object-fit: cover; border-radius: 6px; display: none; margin-top: 10px; }

        /* AI Notification Processing Box */
        .ai-status-panel { display: none; background-color: #e0f2fe; color: #0369a1; padding: 12px; border-radius: 6px; font-size: 13px; font-weight: bold; text-align: center; margin-bottom: 15px; border: 1px solid #bae6fd; }

        .submit-action { width: 100%; background-color: #10b981; color: white; border: none; padding: 14px; font-size: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .hidden-layout { display: none !important; }
        .close-btn { background-color: #ef4444; color: white; border: none; padding: 6px 12px; font-size: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Top Navigation Header -->
    <div class="navbar">
        <h1 onclick="showView('browse')">Smart<span>List</span></h1>
        <button class="post-btn" onclick="showView('post')">+ Post Ad</button>
    </div>

    <div class="container">
        <!-- VIEW 1: BROWSE SYSTEM SCREEN -->
        <div id="view-browse">
            <h2>Browse Categories</h2>
            <div class="grid-system">
                <div class="category-box" onclick="filterData('property')">🏢 Property</div>
                <div class="category-box" onclick="filterData('fashion')">👕 Fashion</div>
                <div class="category-box" onclick="filterData('footwear')">👟 Footwear</div>
                <div class="category-box" onclick="filterData('services')">🤝 Services</div>
                <div class="category-box" onclick="filterData('loans')">💰 Loans</div>
                <div class="category-box" onclick="filterData('cars')">🚗 Cars</div>
                <div class="category-box" onclick="filterData('mobiles')">📱 Mobiles</div>
                <div class="category-box" onclick="filterData('plumber')">🔧 Plumber</div>
                <div class="category-box" onclick="filterData('maid')">🧹 Maid</div>
                <div class="category-box" onclick="filterData('security')">🛡️ Security</div>
                <div class="category-box" onclick="filterData('shopkeeper')">🏪 Shopkeeper</div>
                <div class="category-box" onclick="filterData('wholesale')">📦 Wholesale</div>
            </div>

            <h2>Recent Advertisements</h2>
            <div id="ads-grid" style="background-color: white; padding: 20px; border-radius: 8px; border: 1px solid #e5e7eb; text-align: center; color: #6b7280; font-size: 14px; margin-top: 10px;">
                No ads available. Tap "+ Post Ad" to upload from your gallery!
            </div>
        </div>

        <!-- VIEW 2: CREATE AD WITH AI SCANNER SCREEN -->
        <div id="view-post" class="hidden-layout">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 style="margin:0;">Create Advertisement</h2>
                <button class="close-btn" onclick="showView('browse')">X Close</button>
            </div>

            <div class="form-box">
                <!-- AI Scanner Gallery Box -->
                <div class="upload-area" onclick="document.getElementById('gallery-picker').click()">
                    📸 Click to Select Image from Gallery
                    <input type="file" id="gallery-picker" accept="image/*" style="display:none;" onchange="runAIScanner(event)">
                    <img id="image-preview" alt="Selected Preview">
                </div>

                <!-- Processing Banner -->
                <div id="ai-banner" class="ai-status-panel"></div>

                <form onsubmit="saveAdForm(event)">
                    <div class="form-row">
                        <label>Listing Title / Business Name</label>
                        <input type="text" id="form-name" required class="input-field" placeholder="AI will auto-fill or type here">
                    </div>

                    <div class="form-row">
                        <label>Category</label>
                        <select id="form-category" required class="input-field">
                            <option value="">Select Category</option>
                            <option value="property">Property</option>
                            <option value="fashion">Fashion</option>
                            <option value="footwear">Footwear</option>
                            <option value="services">Services</option>
                            <option value="loans">Loans</option>
                            <option value="cars">Cars</option>
                            <option value="mobiles">Mobiles</option>
                            <option value="plumber">Plumber</option>
                            <option value="maid">Maid</option>
                            <option value="security">Security</option>
                            <option value="shopkeeper">Shopkeeper</option>
                            <option value="wholesale">Wholesale</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <label>Price / Service Fees (₹)</label>
                        <input type="text" id="form-price" required class="input-field" placeholder="AI will auto-fill price">
                    </div>

                    <div class="form-row">
                        <label>WhatsApp Number</label>
                        <input type="tel" required class="input-field" placeholder="e.g. 919876543210">
                    </div>

                    <div class="form-row">
                        <label>Address / Location</label>
                        <input type="text" required class="input-field" placeholder="City name, Area">
                    </div>

                    <button type="submit" class="submit-action">Publish Ad Now</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // BACKEND CONNECTIONS CONFIG
        const CLOUDFLARE_WORKER_URL = 'https://workers.dev'; 
        const GEMINI_API_KEY = 'YOUR_GEMINI_API_KEY'; // <-- Enter your Google Gemini Key here

        // Reliable View Swapper Engine
        function showView(target) {
            var browseScreen = document.getElementById('view-browse');
            var postScreen = document.getElementById('view-post');
            
            if (target === 'browse') {
                browseScreen.classList.remove('hidden-layout');
                postScreen.classList.add('hidden-layout');
            } else {
                browseScreen.classList.add('hidden-layout');
                postScreen.classList.remove('hidden-layout');
            }
        }

        // Live AI Flash Scanner Workflow
        async function runAIScanner(event) {
            var input = event.target;
            if (!input.files || !input.files[0]) return;
            var file = input.files[0];

            // Render gallery picture preview
            var reader = new FileReader();
            reader.onload = function(e) {
                var img = document.getElementById('image-preview');
                img.src = e.target.result;
                img.style.display = 'block';
            }
            reader.readAsDataURL(file);

            // Pop up the scanning notice panel
            var banner = document.getElementById('ai-banner');
            banner.style.display = 'block';
            banner.style.backgroundColor = '#e0f2fe';
            banner.style.color = '#0369a1';
            banner.style.borderColor = '#bae6fd';
            banner.innerText = "⏳ AI is processing photo from gallery... Scanning details...";

            try {
